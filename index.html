<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Premium Gallery Experience</title>
    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap"
      rel="stylesheet"
    />
    <!-- GSAP & Confetti CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
      :root {
        --bg: #0a0a0a;
        --accent: #d4af37;
        /* Premium Gold */
        --glass: rgba(255, 255, 255, 0.1);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background-color: var(--bg);
        color: #fff;
        font-family: "Montserrat", sans-serif;
        overflow: hidden;
        /* Hide scroll during intro */
      }

      /* Initial Hero Image Section */
      #intro-wrapper {
        position: fixed;
        inset: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 100;
        background: var(--bg);
      }

      .hero-img-container {
        width: 300px;
        height: 400px;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.1);
        transform: scale(0);
      }

      .hero-img-container img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      /* Greeting Popup */
      #popup-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(10px);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 200;
        opacity: 0;
        visibility: hidden;
      }

      .premium-card {
        background: var(--glass);
        padding: 3rem;
        border-radius: 30px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        text-align: center;
        max-width: 500px;
        width: 90%;
        position: relative;
      }

      .premium-card h1 {
        font-family: "Playfair Display", serif;
        font-size: 2.5rem;
        margin-bottom: 1rem;
        color: var(--accent);
      }

      .premium-card p {
        font-weight: 300;
        line-height: 1.6;
        margin-bottom: 2rem;
        letter-spacing: 1px;
      }

      .btn-premium {
        background: var(--accent);
        color: #000;
        padding: 1rem 2.5rem;
        border: none;
        border-radius: 50px;
        font-weight: 600;
        cursor: pointer;
        text-transform: uppercase;
        letter-spacing: 2px;
        transition: transform 0.3s ease;
      }

      .btn-premium:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3);
      }

      /* Grid Layout */
      #gallery-section {
        padding: 5vh 10vw;
        opacity: 0;
        display: none;
      }

      .gallery-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 20px;
      }

      .grid-item {
        /* height: 350px; */
        height: 500px;
        border-radius: 15px;
        overflow: hidden;
        opacity: 0;
        transform: translateY(30px);
      }

      .grid-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.8s cubic-bezier(0.2, 1, 0.3, 1);
      }

      .grid-item:hover img {
        transform: scale(1.1);
      }

      /* Background animated blur */
      .bg-glow {
        position: fixed;
        width: 40vw;
        height: 40vw;
        background: radial-gradient(
          circle,
          rgba(212, 175, 55, 0.1) 0%,
          transparent 70%
        );
        top: -10%;
        right: -10%;
        z-index: -1;
      }
    </style>
  </head>

  <body>
    <div class="bg-glow"></div>

    <!-- Background Music -->
    <audio id="bg-music" src="./razil.mp3" loop></audio>

    <!-- 1. Initial Photo Wrapper -->
    <div id="intro-wrapper">
      <div class="hero-img-container" id="main-hero">
        <!-- REPLACE WITH YOUR FIRST IMAGE -->
        <img src="./razil.jpeg" alt="Celebration" />
      </div>
    </div>

    <!-- 2. Greeting Popup -->
    <div id="popup-overlay">
      <div class="premium-card" id="popup-card">
        <h1>Welcome to the Celebration</h1>
        <p>
          Every moment captured is a memory that lasts forever. Experience the
          journey through our lens.
        </p>
        <button class="btn-premium" onclick="revealGallery()">
          View Gallery
        </button>
      </div>
    </div>

    <!-- 3. Photo Grid -->
    <main id="gallery-section">
      <div class="gallery-grid">
        <div class="grid-item"><img src="./razil.jpeg" alt="" /></div>

        <div class="grid-item"><img src="./razil1.jpeg" alt="" /></div>
        <div class="grid-item"><img src="./razil2.jpeg" alt="" /></div>
        <div class="grid-item"><img src="./razil3.jpeg" alt="" /></div>
        <div class="grid-item"><img src="./razil4.jpeg" alt="" /></div>
        <div class="grid-item"><img src="./razil5.jpeg" alt="" /></div>
        <div class="grid-item"><img src="./razil6.jpeg" alt="" /></div>
        <div class="grid-item"><img src="./razil7.jpeg" alt="" /></div>
        <div class="grid-item"><img src="./razil8.jpeg" alt="" /></div>
        <div class="grid-item"><img src="./razil9.jpeg" alt="" /></div>
        <div class="grid-item"><img src="./razil10.jpeg" alt="" /></div>
        <div class="grid-item"><img src="./razil11.jpeg" alt="" /></div>
        <div class="grid-item"><img src="./razil12.jpeg" alt="" /></div>
        <div class="grid-item"><img src="./razil13.jpeg" alt="" /></div>
        <div class="grid-item"><img src="./razil14.jpeg" alt="" /></div>
        <div class="grid-item"><img src="./razil15.jpeg" alt="" /></div>
        <div class="grid-item"><img src="./razil16.jpeg" alt="" /></div>
        <div class="grid-item"><img src="./razil17.jpeg" alt="" /></div>
        <div class="grid-item"><img src="./razil18.jpeg" alt="" /></div>
        <div class="grid-item"><img src="./razil19.jpeg" alt="" /></div>
        <div class="grid-item"><img src="./razil20.jpeg" alt="" /></div>
        <div class="grid-item"><img src="./razil21.jpeg" alt="" /></div>
        <div class="grid-item"><img src="./razil22.jpeg" alt="" /></div>
        <div class="grid-item"><img src="./razil23.jpeg" alt="" /></div>
        <div class="grid-item"><img src="./razil24.jpeg" alt="" /></div>
        <div class="grid-item"><img src="./razil25.jpeg" alt="" /></div>
        <div class="grid-item"><img src="./razil26.jpeg" alt="" /></div>
        <div class="grid-item"><img src="./razil27.jpeg" alt="" /></div>
        <div class="grid-item"><img src="./razil28.jpeg" alt="" /></div>
      </div>
    </main>

    <script>
      const audio = document.getElementById("bg-music");

      // Start Timeline
      window.onload = () => {
        const tl = gsap.timeline();

        // 1. Zoom in initial photo
        tl.to("#main-hero", {
          scale: 1,
          duration: 1.2,
          ease: "expo.out",
        });

        // 2. Trigger Party Popper AND Music
        tl.add(() => {
          fireConfetti();
          // Try to play music. Note: Might be blocked by browser until user interaction.
          audio
            .play()
            .catch((e) => console.log("Autoplay waiting for user interaction"));
        }, "-=0.5");

        // 2. Trigger Party Popper
        tl.add(() => {
          fireConfetti();
        }, "-=0.5");

        // 3. Show Popup after a short delay
        tl.to("#popup-overlay", {
          autoAlpha: 1,
          duration: 0.8,
          delay: 0.5,
        });

        tl.from(
          "#popup-card",
          {
            y: 50,
            scale: 0.9,
            opacity: 0,
            duration: 1,
            ease: "back.out(1.7)",
          },
          "-=0.5",
        );
      };

      function fireConfetti() {
        const count = 200;
        const defaults = {
          origin: { y: 0.7 },
          colors: ["#d4af37", "#ffffff", "#aa8407"],
        };

        function fire(particleRatio, opts) {
          confetti({
            ...defaults,
            ...opts,
            particleCount: Math.floor(count * particleRatio),
          });
        }

        fire(0.25, { spread: 26, startVelocity: 55 });
        fire(0.2, { spread: 60 });
        fire(0.35, { spread: 100, decay: 0.91, scalar: 0.8 });
        fire(0.1, { spread: 120, startVelocity: 25, decay: 0.92, scalar: 1.2 });
        fire(0.1, { spread: 120, startVelocity: 45 });
      }

      function revealGallery() {
        // Ensure music plays if browser blocked it earlier
        audio.play();
        const tl = gsap.timeline();

        // Hide Popup
        tl.to("#popup-overlay", {
          autoAlpha: 0,
          duration: 0.5,
          ease: "power2.in",
        });

        // Transition Hero to Background/Dissolve
        tl.to("#intro-wrapper", {
          y: -100,
          opacity: 0,
          display: "none",
          duration: 1,
          ease: "expo.inOut",
        });

        // Reveal Grid
        tl.to(
          "#gallery-section",
          {
            display: "block",
            opacity: 1,
            duration: 0.1,
          },
          "-=0.5",
        );

        // Staggered reveal for grid items
        tl.to(
          ".grid-item",
          {
            opacity: 1,
            y: 0,
            duration: 1,
            stagger: 0.1,
            ease: "power4.out",
          },
          "-=0.2",
        );

        // Allow scrolling
        document.body.style.overflow = "auto";
      }
    </script>
  </body>
</html>
